version: '3.8'

services:
  scanner:
    build: .
    container_name: pattern-scanner-alpaca
    ports:
      - "5004:5004"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - PYTHONUNBUFFERED=1
      - TASTYTRADE_CLIENT_SECRET=${TASTYTRADE_CLIENT_SECRET}
      - TASTYTRADE_REFRESH_TOKEN=${TASTYTRADE_REFRESH_TOKEN}
      - TASTYTRADE_ENV=${TASTYTRADE_ENV:-production}
    volumes:
      - ./data:/app/data
